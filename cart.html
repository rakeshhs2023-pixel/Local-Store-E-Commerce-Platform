<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Cart - Shoe Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">&#128095; Shoe Store</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="orders.html">Orders</a></li>
                <li><a href="login.html">Login</a></li>
                <li>
                    <a href="cart.html" class="cart-icon">
                        &#128722;
                        <span class="cart-count">0</span>
                    </a>
                </li>
                <li id="user-info"></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>Your Shoe Cart</h1>
        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; margin-top: 2rem;">
            <div class="cart-items" id="cart-items"></div>

            <div class="cart-summary" id="cart-summary">
                <h2>Order Summary</h2>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (10%):</span>
                    <span id="tax">$0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>
                <a href="checkout.html" class="btn btn-success" style="width: 100%; text-align: center; margin-top: 1rem;">
                    Proceed to Checkout
                </a>
            </div>
        </div>
    </div>

    <script src="products.js?v=2"></script>
    <script src="script.js?v=2"></script>
    <script>
        renderCart();
    </script>
</body>
</html>
