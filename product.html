<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Details - Shoe Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-container">
            <a href="index.html" class="logo">&#128095; Shoe Store</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="orders.html">Orders</a></li>
                <li><a href="login.html">Login</a></li>
                <li>
                    <a href="cart.html" class="cart-icon">
                        &#128722;
                        <span class="cart-count">0</span>
                    </a>
                </li>
                <li id="user-info"></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="product-details">
            <div>
                <img id="product-image" src="" alt="Shoe">
            </div>
            <div class="product-details-info">
                <p class="category" id="product-category"></p>
                <h1 id="product-name"></h1>
                <div class="rating" id="product-rating"></div>
                <p class="price" id="product-price"></p>
                <p id="product-description"></p>
                <button id="add-to-cart-btn" class="btn btn-primary">Add to Cart</button>
                <a href="index.html" class="btn" style="margin-left: 1rem;">Back to Shoes</a>
            </div>
        </div>
    </div>

    <script src="products.js?v=2"></script>
    <script src="script.js?v=2"></script>

        renderProductDetails();
    </script>
</body>
</html>
